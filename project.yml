name: FitTrack
options:
  bundleIdPrefix: com.fittrack
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.fittrack.app

targets:
  FitTrack:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    supportedDestinations:
      - iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
          - "*.xcworkspace/**"
          - "build/**"
    settings:
      base:
        PRODUCT_NAME: FitTrack
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    info:
      path: Info.plist
      properties:
        CFBundleName: FitTrack
        CFBundleDisplayName: FitTrack
        CFBundleIdentifier: com.fittrack.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserNotificationUsageDescription: "FitTrack sends daily reminders to help you stay consistent with your habits."
        NSUserNotificationsUsageDescription: "FitTrack sends daily reminders to help you stay consistent with your habits."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
